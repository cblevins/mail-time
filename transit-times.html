<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>How Fast Was the Mail?</title>
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAzMiAzMiI+PHJlY3Qgd2lkdGg9IjMyIiBoZWlnaHQ9IjMyIiByeD0iNSIgZmlsbD0iIzNiMmExYSIvPjxyZWN0IHg9IjgiIHk9IjYiIHdpZHRoPSIxNiIgaGVpZ2h0PSIyLjUiIHJ4PSIxLjIiIGZpbGw9IiNjNGI5OWEiLz48cmVjdCB4PSI4IiB5PSIyMy41IiB3aWR0aD0iMTYiIGhlaWdodD0iMi41IiByeD0iMS4yIiBmaWxsPSIjYzRiOTlhIi8+PHBvbHlnb24gcG9pbnRzPSI4LDguNSAyNCw4LjUgMTYsMTYiIGZpbGw9IiNlOGEwMzAiLz48cG9seWdvbiBwb2ludHM9IjgsMjMuNSAyNCwyMy41IDE2LDE2IiBmaWxsPSIjZThhMDMwIi8+PC9zdmc+"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Source+Sans+Pro:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Source Sans Pro", sans-serif;
        background: #f4f0e8;
        color: #2c2416;
        line-height: 1.5;
      }

      h1,
      h2,
      h3 {
        font-family: "Playfair Display", serif;
      }

      header {
        background: #3b2a1a;
        color: #f4f0e8;
        padding: 1.2rem 2rem 0.7rem;
        text-align: center;
      }

      header h1 {
        font-size: 2rem;
        font-weight: 700;
        margin-bottom: 0.25rem;
      }

      header p {
        font-size: 0.95rem;
        opacity: 0.85;
        max-width: 700px;
        margin: 0 auto;
      }

      /* Year selector */
      #year-selector {
        background: #2e1f0d;
        padding: 0.5rem 1rem;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.6rem;
        border-bottom: 2px solid #5a3a1a;
      }

      #year-selector .label {
        color: #c4b99a;
        font-size: 0.88rem;
        font-weight: 600;
        letter-spacing: 0.03em;
        text-transform: uppercase;
        margin-right: 0.25rem;
      }

      .year-btn {
        background: transparent;
        border: 1.5px solid #8b7355;
        border-radius: 20px;
        padding: 0.28rem 1.1rem;
        font-family: "Playfair Display", serif;
        font-size: 1rem;
        cursor: pointer;
        transition: all 0.2s;
        color: #c4b99a;
        font-weight: 700;
        letter-spacing: 0.02em;
      }

      .year-btn:hover {
        background: rgba(196, 185, 154, 0.15);
        border-color: #c4b99a;
      }

      .year-btn.active {
        background: #c4b99a;
        color: #2e1f0d;
        border-color: #c4b99a;
      }

      /* Destination selector */
      #dest-selector {
        background: #ebe6d9;
        border-bottom: 1px solid #c4b99a;
        padding: 0.75rem 1rem;
        display: flex;
        align-items: center;
        gap: 0.5rem;
        flex-wrap: wrap;
        justify-content: center;
      }

      #dest-selector .label {
        font-weight: 600;
        font-size: 0.9rem;
        margin-right: 0.25rem;
        white-space: nowrap;
        text-transform: uppercase;
      }

      .dest-btn {
        background: #f4f0e8;
        border: 1px solid #c4b99a;
        border-radius: 20px;
        padding: 0.35rem 0.85rem;
        font-family: "Source Sans Pro", sans-serif;
        font-size: 0.85rem;
        cursor: pointer;
        transition: all 0.2s;
        color: #2c2416;
        white-space: nowrap;
      }

      .dest-btn:hover {
        background: #d4cbb5;
      }

      .dest-btn.active {
        background: #8b4513;
        color: #f4f0e8;
        border-color: #6b3410;
        font-weight: 600;
      }

      /* Main layout */
      #main-content {
        display: flex;
        height: calc(100vh - 200px);
        min-height: 450px;
      }

      #map-container {
        flex: 1;
        position: relative;
      }

      #map {
        width: 100%;
        height: 100%;
      }

      .leaflet-tile-pane {
        filter: sepia(0.3) saturate(0.8);
      }

      /* Legend overlay on map */
      #legend {
        position: absolute;
        bottom: 25px;
        left: 10px;
        background: rgba(244, 240, 232, 0.95);
        border: 1px solid #c4b99a;
        border-radius: 6px;
        padding: 10px 12px;
        z-index: 1000;
        font-size: 0.8rem;
        min-width: 180px;
      }

      #legend h3 {
        font-size: 0.85rem;
        margin-bottom: 6px;
      }

      #legend-bar {
        height: 14px;
        border-radius: 3px;
        margin-bottom: 4px;
      }

      #legend-labels {
        position: relative;
        height: 1.1em;
        font-size: 0.7rem;
        color: #5a4a36;
        margin-top: 2px;
      }

      #legend .legend-note {
        margin-top: 8px;
        font-size: 0.7rem;
        color: #8b7355;
        border-top: 1px solid #c4b99a;
        padding-top: 6px;
      }

      .legend-item {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-top: 3px;
      }

      .legend-rr-toggle {
        margin-top: 8px;
        border-top: 1px solid #c4b99a;
        padding-top: 6px;
        font-size: 0.7rem;
        color: #8b7355;
      }
      .legend-rr-toggle label {
        display: flex;
        align-items: center;
        gap: 5px;
        cursor: pointer;
      }
      .legend-rr-toggle input[type="checkbox"] {
        cursor: pointer;
        accent-color: #8b4513;
      }

      .legend-circle {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        border: 2px solid;
        flex-shrink: 0;
      }

      /* Time formatting */
      .time-num {
        font-weight: 700;
      }

      .time-unit {
        font-size: 0.78em;
        color: #8b7355;
        letter-spacing: 0.02em;
        margin-left: 1px;
      }

      /* Detail panel */
      #detail-panel {
        width: 340px;
        background: #ebe6d9;
        border-left: 1px solid #c4b99a;
        overflow-y: auto;
        padding: 0;
        display: flex;
        flex-direction: column;
      }

      /* Search box */
      #search-container {
        padding: 0.75rem 1rem;
        border-bottom: 1px solid #c4b99a;
        position: relative;
      }

      #search-input {
        width: 100%;
        padding: 0.5rem 0.75rem;
        border: 1px solid #c4b99a;
        border-radius: 6px;
        font-family: "Source Sans Pro", sans-serif;
        font-size: 0.9rem;
        background: #f4f0e8;
        color: #2c2416;
        outline: none;
        transition: border-color 0.2s;
      }

      #search-input:focus {
        border-color: #8b4513;
      }

      #search-input::placeholder {
        color: #b0a490;
      }

      #search-results {
        position: absolute;
        top: 100%;
        left: 0.75rem;
        right: 0.75rem;
        background: #f4f0e8;
        border: 1px solid #c4b99a;
        border-top: none;
        border-radius: 0 0 6px 6px;
        z-index: 1000;
        max-height: 320px;
        overflow-y: auto;
        display: none;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      }

      .search-result {
        padding: 0.5rem 0.75rem;
        cursor: pointer;
        border-bottom: 1px solid #e5e0d4;
        transition: background 0.15s;
      }

      .search-result:last-child {
        border-bottom: none;
      }

      .search-result:hover {
        background: #ebe6d9;
      }

      .search-result .sr-city {
        font-weight: 600;
        font-size: 0.9rem;
      }

      .search-result .sr-state {
        color: #8b7355;
        font-size: 0.8rem;
        margin-left: 0.25rem;
      }

      .search-result .sr-time {
        font-size: 0.8rem;
        color: #5a4a36;
        margin-top: 1px;
      }

      #back-btn {
        display: none;
        background: none;
        border: none;
        padding: 0.5rem 1rem 0;
        font-family: "Source Sans Pro", sans-serif;
        font-size: 0.8rem;
        color: #8b7355;
        cursor: pointer;
        text-align: left;
        transition: color 0.15s;
      }

      #back-btn:hover {
        color: #5a4a36;
      }

      /* Detail content */
      #detail-content {
        flex: 1;
        padding: 1.25rem;
        overflow-y: auto;
        min-height: 0;
      }

      #detail-content.hub-table-mode {
        display: flex;
        flex-direction: column;
        padding: 0;
        overflow: hidden;
      }

      #detail-panel.empty #detail-content {
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        color: #8b7355;
      }

      #detail-panel .city-name {
        font-family: "Playfair Display", serif;
        font-size: 1.35rem;
        font-weight: 700;
        margin-bottom: 0.1rem;
      }

      #detail-panel .city-state {
        font-size: 0.85rem;
        color: #8b7355;
        margin-bottom: 0.15rem;
      }

      .city-year-label {
        font-size: 0.82rem;
        color: #5a4a36;
        margin-bottom: 0.85rem;
      }

      .dynamic-year {
        background: rgba(139, 115, 85, 0.14);
        border-radius: 3px;
        padding: 0 3px;
        font-style: italic;
      }

      .bar-row {
        display: flex;
        align-items: center;
        margin-bottom: 6px;
        font-size: 0.8rem;
      }

      .bar-label {
        width: 95px;
        text-align: right;
        padding-right: 8px;
        font-size: 0.78rem;
        flex-shrink: 0;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .bar-track {
        flex: 1;
        height: 18px;
        background: #d8d1c3;
        border-radius: 3px;
        position: relative;
        overflow: hidden;
      }

      .bar-fill {
        height: 100%;
        border-radius: 3px;
        transition:
          width 0.4s ease,
          background-color 0.4s ease;
        min-width: 2px;
      }

      .bar-time {
        width: 110px;
        text-align: left;
        padding-left: 8px;
        font-size: 0.78rem;
        color: #5a4a36;
        flex-shrink: 0;
        white-space: nowrap;
      }

      .bar-row.fastest .bar-label {
        font-weight: 600;
        color: #2d6a2e;
      }
      .bar-row.slowest .bar-label {
        font-weight: 600;
        color: #8b2500;
      }

      /* Hub table */
      .hub-table-header {
        padding: 1rem 1rem 0.5rem;
        border-bottom: 1px solid #c4b99a;
        flex-shrink: 0;
      }

      .hub-table-header .city-state {
        font-size: 0.85rem;
        color: #8b7355;
        margin-bottom: 0.15rem;
      }

      .hub-table-list {
        flex: 1;
        overflow-y: auto;
        padding: 0;
      }

      .hub-table-row {
        display: flex;
        align-items: center;
        padding: 5px 10px;
        border-bottom: 1px solid #e5e0d4;
        cursor: pointer;
        transition: background 0.12s;
        font-size: 0.8rem;
      }

      .hub-table-row:hover,
      .hub-table-row.hovered {
        background: #ddd8c8;
      }

      .hub-table-row.selected {
        background: #d4cdb8;
        font-weight: 600;
      }

      .hub-table-row.no-data {
        color: #b0a490;
        cursor: default;
      }

      .hub-table-row .ht-rank {
        width: 26px;
        text-align: right;
        padding-right: 6px;
        color: #8b7355;
        font-size: 0.72rem;
        flex-shrink: 0;
      }

      .hub-table-row .ht-city {
        flex: 1;
        min-width: 0;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .hub-table-row .ht-state {
        color: #8b7355;
        font-size: 0.72rem;
        margin-left: 3px;
      }

      .hub-table-row .ht-bar {
        width: 60px;
        height: 12px;
        background: #d8d1c3;
        border-radius: 2px;
        overflow: hidden;
        margin: 0 6px;
        flex-shrink: 0;
      }

      .hub-table-row .ht-bar-fill {
        height: 100%;
        border-radius: 2px;
      }

      .hub-table-row .ht-time {
        width: 90px;
        text-align: right;
        flex-shrink: 0;
        font-size: 0.78rem;
        color: #5a4a36;
      }

      /* Context section */
      #context-section {
        padding: 1.5rem 2rem 2rem;
        max-width: 900px;
        margin: 0 auto;
        text-align: center;
      }

      #context-section h2 {
        font-size: 1.3rem;
        margin-bottom: 0.75rem;
      }

      #context-section p {
        font-size: 0.92rem;
        color: #5a4a36;
        line-height: 1.7;
        margin-bottom: 0.75rem;
      }

      #stats {
        display: flex;
        gap: 1.5rem;
        justify-content: center;
        flex-wrap: wrap;
        margin-top: 1rem;
      }

      .stat-card {
        background: #ebe6d9;
        border: 1px solid #c4b99a;
        border-radius: 8px;
        padding: 1rem 1.5rem;
        text-align: center;
        min-width: 180px;
      }

      .stat-card .stat-value {
        font-family: "Playfair Display", serif;
        font-size: 1.3rem;
        font-weight: 700;
        color: #8b4513;
      }

      .stat-card .stat-label {
        font-size: 0.8rem;
        color: #8b7355;
        margin-top: 0.2rem;
      }

      .stat-card .stat-detail {
        font-size: 0.75rem;
        color: #a89880;
        margin-top: 0.15rem;
      }

      footer {
        text-align: center;
        padding: 1rem;
        font-size: 0.8rem;
        color: #8b7355;
        border-top: 1px solid #c4b99a;
      }

      /* About button in header */
      #about-btn {
        position: absolute;
        top: 50%;
        right: 1.5rem;
        transform: translateY(-50%);
        background: #c4b99a;
        border: 1.5px solid #c4b99a;
        border-radius: 20px;
        padding: 0.28rem 1.1rem;
        font-family: "Source Sans Pro", sans-serif;
        font-size: 0.85rem;
        font-weight: 600;
        color: #2e1f0d;
        cursor: pointer;
        transition: all 0.2s;
      }
      #about-btn:hover {
        background: #d4cbb5;
        border-color: #d4cbb5;
      }

      /* About modal overlay */
      #about-modal {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(30, 15, 5, 0.65);
        z-index: 2000;
        align-items: center;
        justify-content: center;
      }
      #about-box {
        background: #f4f0e8;
        border: 1px solid #c4b99a;
        border-radius: 6px;
        max-width: 560px;
        width: 90%;
        max-height: 80vh;
        overflow-y: auto;
        padding: 2rem 2.5rem;
        position: relative;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
      }
      #about-close {
        position: absolute;
        top: 0.75rem;
        right: 1rem;
        background: none;
        border: none;
        font-size: 1.2rem;
        color: #8b7355;
        cursor: pointer;
        line-height: 1;
      }
      #about-close:hover {
        color: #3b2a1a;
      }
      #about-content h2 {
        font-family: "Playfair Display", serif;
        font-size: 1.4rem;
        color: #3b2a1a;
        margin-bottom: 1rem;
      }
      #about-content h3 {
        font-family: "Playfair Display", serif;
        font-size: 1rem;
        color: #5a3a1a;
        margin: 1.25rem 0 0.4rem;
      }
      #about-content p,
      #about-content li {
        font-size: 0.9rem;
        color: #2c2416;
        line-height: 1.6;
      }
      #about-content ul {
        padding-left: 1.25rem;
      }
      #about-content a {
        color: #8b4513;
      }

      /* Custom map tooltip */
      #map-tooltip {
        position: absolute;
        z-index: 1000;
        background: rgba(244, 240, 232, 0.95);
        border: 1px solid #c4b99a;
        border-radius: 4px;
        padding: 6px 10px;
        font-family: "Source Sans Pro", sans-serif;
        font-size: 0.85rem;
        color: #2c2416;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
        pointer-events: none;
        display: none;
        white-space: nowrap;
      }

      #map-tooltip .tt-city {
        font-weight: 600;
        font-family: "Playfair Display", serif;
      }

      #map-tooltip .tt-time {
        color: #8b4513;
        font-weight: 600;
      }

      #map-tooltip .tt-nodata {
        color: #b0a490;
        font-style: italic;
      }

      /* Responsive */
      @media (max-width: 900px) {
        #main-content {
          flex-direction: column;
          height: auto;
        }

        #map-container {
          height: 50vh;
          min-height: 350px;
        }

        #detail-panel {
          width: 100%;
          border-left: none;
          border-top: 1px solid #c4b99a;
          max-height: 400px;
        }

        header {
          padding: 0.8rem 1rem 0.5rem;
        }

        header h1 {
          font-size: 1.5rem;
        }

        #dest-selector {
          gap: 0.35rem;
          padding: 0.5rem;
          max-height: 90px;
          overflow-y: auto;
        }

        .dest-btn {
          font-size: 0.75rem;
          padding: 0.25rem 0.6rem;
        }

        #year-selector {
          gap: 0.4rem;
          overflow-x: auto;
          flex-wrap: nowrap;
          justify-content: flex-start;
          padding-left: 0.75rem;
        }

        .year-btn {
          font-size: 0.9rem;
          padding: 0.22rem 0.8rem;
          white-space: nowrap;
          flex-shrink: 0;
        }
      }

      @media (max-width: 480px) {
        header p {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <header style="position: relative">
      <h1 id="main-title">How Fast Was the Mail?</h1>
      <p>
        Explore how long it took the mail to travel via railroad between major
        U.S. cities.
      </p>
      <button
        id="about-btn"
        onclick="document.getElementById('about-modal').style.display = 'flex'"
        aria-label="About this visualization"
      >
        About
      </button>
    </header>

    <div id="year-selector" role="group" aria-label="Select year">
      <span class="label">Select Year:</span>
      <button
        class="year-btn active"
        onclick="switchYear(1882)"
        aria-pressed="true"
      >
        1882
      </button>
      <button class="year-btn" onclick="switchYear(1883)" aria-pressed="false">
        1883
      </button>
      <button class="year-btn" onclick="switchYear(1892)" aria-pressed="false">
        1892
      </button>
      <button class="year-btn" onclick="switchYear(1902)" aria-pressed="false">
        1902
      </button>
      <button class="year-btn" onclick="switchYear(1908)" aria-pressed="false">
        1908
      </button>
    </div>

    <div id="dest-selector" role="group" aria-label="Select destination city">
      <span class="label">Hub cities:</span>
    </div>

    <div id="main-content">
      <div id="map-container">
        <div
          id="map"
          role="application"
          aria-label="Interactive map of U.S. mail transit times"
        ></div>
        <div id="map-tooltip"></div>
        <div id="legend">
          <h3>Transit Time</h3>
          <div id="legend-bar"></div>
          <div id="legend-labels"></div>
          <div class="legend-note">
            <div class="legend-item">
              <div
                class="legend-circle"
                style="
                  width: 14px;
                  height: 14px;
                  border-color: #3b2a1a;
                  border-width: 1.5px;
                  background: #e8a030;
                  flex-shrink: 0;
                "
              ></div>
              <span>Hub city</span>
            </div>
            <div class="legend-item">
              <div
                class="legend-circle"
                style="
                  width: 10px;
                  height: 10px;
                  border-color: #5a4a36;
                  background: #e8a030;
                  flex-shrink: 0;
                "
              ></div>
              <span>Other city</span>
            </div>
          </div>
          <div class="legend-rr-toggle">
            <label>
              <input
                type="checkbox"
                id="rr-toggle-check"
                checked
                onchange="toggleRailroads()"
              />
              Railroads
            </label>
          </div>
        </div>
      </div>

      <div id="detail-panel" class="empty" aria-live="polite">
        <button
          id="back-btn"
          onclick="resetView()"
          aria-label="Return to all cities view"
        >
          ← All cities
        </button>
        <div id="search-container">
          <input
            type="text"
            id="search-input"
            placeholder="Search for a city..."
            autocomplete="off"
            aria-label="Search for a city"
          />
          <div id="search-results"></div>
        </div>
        <div id="detail-content">
          <p style="font-size: 0.95rem">
            Click a city on the map or search above to see its transit times to
            all destinations.
          </p>
        </div>
      </div>
    </div>

        "Cheyenne City, Wyoming": [41.14, -104.8202], // old name alias
      };

      // ============================================================
      // UTILITY: TIME FORMATTING
      // ============================================================
      function formatTimeHtml(totalMinutes) {
        if (totalMinutes === null || totalMinutes === undefined)
          return '<span class="time-unit">No data</span>';
        if (totalMinutes === 0)
          return '<span class="time-unit">Same city</span>';
        const days = Math.floor(totalMinutes / (24 * 60));
        const hours = Math.floor((totalMinutes % (24 * 60)) / 60);
        const mins = Math.round(totalMinutes % 60);
        let parts = [];
        if (days > 0)
          parts.push(
            `<span class="time-num">${days}</span><span class="time-unit"> days</span>`,
          );
        if (hours > 0)
          parts.push(
            `<span class="time-num">${hours}</span><span class="time-unit"> hrs</span>`,
          );
        if (mins > 0 && days === 0)
          parts.push(
            `<span class="time-num">${mins}</span><span class="time-unit"> min</span>`,
          );
        return parts.join(" ") || '<span class="time-unit">&lt; 1 min</span>';
      }

      function formatTimePlain(totalMinutes) {
        if (totalMinutes === null || totalMinutes === undefined)
          return "No data";
        if (totalMinutes === 0) return "Same city";
        const days = Math.floor(totalMinutes / (24 * 60));
        const hours = Math.floor((totalMinutes % (24 * 60)) / 60);
        const mins = Math.round(totalMinutes % 60);
        let parts = [];
        if (days > 0) parts.push(days + (days === 1 ? " day" : " days"));
        if (hours > 0) parts.push(hours + (hours === 1 ? " hr" : " hrs"));
        if (mins > 0 && days === 0) parts.push(mins + " min");
        return parts.join(", ") || "< 1 min";
      }

      // ============================================================
      // DATA PARSING (long format CSV)
      // ============================================================

      // Build a normalized coordinate lookup (lowercase keys to handle spelling variants)
      const coordsLookup = new Map();
      for (const [key, coords] of Object.entries(CITY_COORDS)) {
        coordsLookup.set(key.toLowerCase(), coords);
      }

      function lookupCoords(cityName, stateName) {
        const key = (cityName + ", " + stateName).toLowerCase();
        return coordsLookup.get(key) || null;
      }

      // Parse the full merged CSV once
      const parsedAll = Papa.parse(CSV_DATA, {
        header: true,
        skipEmptyLines: true,
        dynamicTyping: true,
      });

      // Build cities array for a given year
      function buildCitiesForYear(year) {
        const cityMap = new Map();

        parsedAll.data.forEach((row) => {
          if (row.year !== year) return;

          const destNorm = DEST_NORMALIZE[row.destination_city];
          if (!destNorm) return; // skip unrecognized destination names

          const cityKey = row.origin_city + ", " + row.origin_state;

          if (!cityMap.has(cityKey)) {
            cityMap.set(cityKey, {
              name: row.origin_city,
              state: row.origin_state,
              key: cityKey,
              times: {},
              hasData: false,
            });
          }

          const city = cityMap.get(cityKey);
          const minutes =
            row.hours !== null && row.hours > 0 ? row.hours * 60 : null;
          city.times[destNorm] = minutes;
          if (minutes !== null) city.hasData = true;
        });

        const result = [];
        cityMap.forEach((city) => {
          const coords = lookupCoords(city.name, city.state);
          if (!coords) return; // skip cities with no coordinate match

          city.coords = coords;
          // Ensure all 12 destinations are present (null if not in data)
          DESTINATIONS.forEach((dest) => {
            if (!(dest in city.times)) city.times[dest] = null;
          });
          result.push(city);
        });

        return result;
      }

      // Pre-build cities for all four years
      const citiesByYear = {
        1882: buildCitiesForYear(1882),
        1883: buildCitiesForYear(1883),
        1892: buildCitiesForYear(1892),
        1902: buildCitiesForYear(1902),
        1908: buildCitiesForYear(1908),
      };

      // ============================================================
      // COLOR SCALE
      // ============================================================
      const MAX_MINUTES = 210 * 60;
      const colorScale = d3
        .scalePow()
        .exponent(0.5)
        .domain([0, MAX_MINUTES])
        .range([0, 1]);
      const colorInterp = d3.interpolateYlOrRd;

      function getColor(minutes) {
        if (minutes === null || minutes === undefined) return "#ccc";
        if (minutes === 0) return "#4a9eda";
        return colorInterp(colorScale(Math.min(minutes, MAX_MINUTES)));
      }

      // Build legend gradient
      const legendBar = document.getElementById("legend-bar");
      const stops = [];
      for (let i = 0; i <= 20; i++) {
        const mins = (i / 20) * MAX_MINUTES;
        stops.push(colorInterp(colorScale(mins)));
      }
      legendBar.style.background = `linear-gradient(to right, ${stops.join(", ")})`;

      const legendLabelsEl = document.getElementById("legend-labels");
      const midMinutes = 48 * 60;
      const midPct = colorScale(midMinutes) * 100;
      legendLabelsEl.innerHTML = `
    <span style="position:absolute;left:0;">0</span>
    <span style="position:absolute;left:${midPct}%;transform:translateX(-50%);">2 days</span>
    <span style="position:absolute;right:0;">8+ days</span>
`;

      // ============================================================
      // MAP SETUP
      // ============================================================
      const map = L.map("map", {
        center: [39.0, -96.0],
        zoom: 4,
        minZoom: 3,
        maxZoom: 8,
        zoomControl: true,
      });

      L.tileLayer(
        "https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png",
        {
          attribution:
            '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/">CARTO</a>',
          maxZoom: 19,
        },
      ).addTo(map);

      // ============================================================
      // RAILROAD LAYER
      // ============================================================
      let currentYear = 1882;
      let rrLayer = null;
      let rrData = null;
      let showRailroads = true;

      // __RR_DATA_INJECT__
      fetch("rr_lines.geojson")
        .then((r) => r.json())
        .then((data) => {
          rrData = data;
          updateRRLayer();
        });

      function updateRRLayer() {
        if (rrLayer) {
          map.removeLayer(rrLayer);
          rrLayer = null;
        }
        if (!rrData || !showRailroads) return;

        const filtered = {
          type: "FeatureCollection",
          features: rrData.features.filter(
            (f) => f.properties.InOpBy <= currentYear,
          ),
        };

        rrLayer = L.geoJSON(filtered, {
          style: {
            color: "#3b1a08",
            weight: 1,
            opacity: 0.4,
          },
          onEachFeature: function (feature, layer) {
            layer.on("mouseover", function (e) {
              showTooltip(
                e,
                `Railroad lines in operation by ${feature.properties.InOpBy}`,
              );
            });
            layer.on("mouseout", hideTooltip);
          },
        }).addTo(map);

        rrLayer.bringToBack();
      }

      function toggleRailroads() {
        showRailroads = !showRailroads;
        updateRRLayer();
      }

      function resetView() {
        selectedCity = null;
        viewMode = "hub";
        map.setView([39.0, -96.0], 4, { animate: true });
        document
          .querySelectorAll(".dest-btn")
          .forEach((b) => b.classList.remove("active"));
        updateMapColors();
        updateHubTable();
        document.getElementById("back-btn").style.display = "none";
      }

      // ============================================================
      // STATE VARIABLES
      // ============================================================
      let cities = citiesByYear[1882];
      let cityMarkers = {};
      let selectedCity = "Chicago";
      let currentDest = "Chicago";
      let viewMode = "hub";

      // Helpers derived from DEST_TO_KEY
      function buildDestHelpers() {
        const destKeySet = new Set(Object.values(DEST_TO_KEY));
        const keyToDest = {};
        for (const [dest, key] of Object.entries(DEST_TO_KEY)) {
          keyToDest[key] = dest;
        }
        return { destKeySet, keyToDest };
      }

      let { destKeySet, keyToDest } = buildDestHelpers();

      // Custom tooltip
      const tooltip = document.getElementById("map-tooltip");
      const mapContainer = document.getElementById("map-container");

      function showTooltip(e, html) {
        tooltip.innerHTML = html;
        tooltip.style.display = "block";
        const rect = mapContainer.getBoundingClientRect();
        const x = e.originalEvent.clientX - rect.left;
        const y = e.originalEvent.clientY - rect.top;
        tooltip.style.left = x + 12 + "px";
        tooltip.style.top = y - 10 + "px";
      }

      function hideTooltip() {
        tooltip.style.display = "none";
      }

      // ============================================================
      // MARKER CREATION (called on init and on year switch)
      // ============================================================
      function createMarkers() {
        // Remove existing markers
        for (const entry of Object.values(cityMarkers)) {
          map.removeLayer(entry.marker);
        }
        cityMarkers = {};

        // Add regular (non-hub) city markers first so hub markers render on top
        cities.forEach((city) => {
          if (destKeySet.has(city.key)) return;

          const minutes = city.times[currentDest];
          const color = city.hasData ? getColor(minutes) : "#ccc";

          const marker = L.circleMarker(city.coords, {
            radius: 6,
            fillColor: color,
            fillOpacity: city.hasData ? 0.85 : 0.4,
            color: "#5a4a36",
            weight: 1,
          }).addTo(map);

          marker.on("mouseover", function (e) {
            if (viewMode === "hub") {
              const mins = city.times[currentDest];
              let timeHtml =
                mins !== null
                  ? `<span class="tt-time">${formatTimePlain(mins)}</span>`
                  : '<span class="tt-nodata">No data</span>';
              showTooltip(
                e,
                `<span class="tt-city">${city.name}</span>, ${city.state}<br>To ${currentDest}: ${timeHtml}`,
              );
              if (selectedCity !== city.key)
                this.setStyle({ radius: 8, weight: 2 });
              highlightTableRow(city.key, true);
            } else {
              showTooltip(
                e,
                `<span class="tt-city">${city.name}</span>, ${city.state}`,
              );
              if (selectedCity !== city.key)
                this.setStyle({ fillOpacity: 0.4, radius: 5 });
            }
          });

          marker.on("mousemove", function (e) {
            const rect = mapContainer.getBoundingClientRect();
            tooltip.style.left =
              e.originalEvent.clientX - rect.left + 12 + "px";
            tooltip.style.top = e.originalEvent.clientY - rect.top - 10 + "px";
          });

          marker.on("mouseout", function () {
            hideTooltip();
            if (selectedCity !== city.key) {
              if (viewMode === "hub") {
                this.setStyle({ radius: 6, weight: 1 });
              } else {
                this.setStyle({ fillOpacity: 0.2, radius: 4, weight: 0.5 });
              }
            }
            highlightTableRow(city.key, false);
          });

          marker.on("click", function () {
            hideTooltip();
            selectCity(city);
          });

          cityMarkers[city.key] = { marker, city, isDest: false };
        });

        // Add hub/destination markers on top
        cities.forEach((city) => {
          if (!destKeySet.has(city.key)) return;

          const destName = keyToDest[city.key];
          if (!destName) return; // skip if not recognized as a hub

          const minutes = city.times[currentDest];
          const fillColor = city.hasData ? getColor(minutes) : "#ccc";

          const marker = L.circleMarker(city.coords, {
            radius: 9,
            fillColor: fillColor,
            fillOpacity: 0.9,
            color: "#3b2a1a",
            weight: 1.5,
          }).addTo(map);

          marker.on("mouseover", function (e) {
            let html;
            if (viewMode === "city" && selectedCity) {
              const selCity = cityMarkers[selectedCity]?.city;
              if (selCity) {
                const mins = selCity.times[destName];
                const timeHtml =
                  mins !== null
                    ? `<span class="tt-time">${formatTimePlain(mins)}</span>`
                    : '<span class="tt-nodata">No data</span>';
                html = `<span class="tt-city">${destName}</span><br>From ${selCity.name}: ${timeHtml}`;
              } else {
                html = `<span class="tt-city">${destName}</span>`;
              }
            } else {
              const mins = city.times[currentDest];
              const timeHtml =
                mins !== null
                  ? `<span class="tt-time">${formatTimePlain(mins)}</span>`
                  : '<span class="tt-nodata">No data</span>';
              html = `<span class="tt-city">${destName}</span><br>To ${currentDest}: ${timeHtml}`;
            }
            showTooltip(e, html);
            if (selectedCity !== city.key)
              this.setStyle({ radius: 11, weight: 2.5 });
          });

          marker.on("mousemove", function (e) {
            const rect = mapContainer.getBoundingClientRect();
            tooltip.style.left =
              e.originalEvent.clientX - rect.left + 12 + "px";
            tooltip.style.top = e.originalEvent.clientY - rect.top - 10 + "px";
          });

          marker.on("mouseout", function () {
            hideTooltip();
            if (selectedCity !== city.key)
              this.setStyle({ radius: 9, weight: 1.5 });
          });

          marker.on("click", function () {
            hideTooltip();
            selectCity(city);
          });

          cityMarkers[city.key] = { marker, city, isDest: true, destName };
        });
      }

      // ============================================================
      // MAP COLOR UPDATE
      // ============================================================
      function updateMapColors() {
        if (viewMode === "hub") {
          Object.values(cityMarkers).forEach(
            ({ marker, city, isDest, destName }) => {
              if (isDest) {
                const isActive = destName === currentDest;
                const minutes = isActive ? 0 : city.times[currentDest];
                marker.setStyle({
                  fillColor: getColor(minutes),
                  fillOpacity: 0.9,
                  radius: isActive ? 11 : 9,
                  weight: isActive ? 2.5 : 1.5,
                  color: "#3b2a1a",
                });
              } else {
                if (!city.hasData) {
                  marker.setStyle({
                    fillColor: "#ccc",
                    fillOpacity: 0.4,
                    radius: 6,
                    weight: 1,
                    color: "#5a4a36",
                  });
                  return;
                }
                const minutes = city.times[currentDest];
                const isSelected = city.key === selectedCity;
                marker.setStyle({
                  fillColor: getColor(minutes),
                  fillOpacity: 0.85,
                  radius: isSelected ? 10 : 6,
                  weight: isSelected ? 3 : 1,
                  color: isSelected ? "#2c2416" : "#5a4a36",
                });
              }
            },
          );
        } else {
          const selEntry = selectedCity ? cityMarkers[selectedCity] : null;
          const selCity = selEntry ? selEntry.city : null;

          Object.values(cityMarkers).forEach(
            ({ marker, city, isDest, destName }) => {
              if (isDest) {
                const minutes = selCity ? selCity.times[destName] : null;
                marker.setStyle({
                  fillColor: minutes !== null ? getColor(minutes) : "#ccc",
                  fillOpacity: 0.9,
                  radius: 9,
                  weight: 1.5,
                  color: "#3b2a1a",
                });
              } else {
                const isSelected = city.key === selectedCity;
                if (isSelected) {
                  marker.setStyle({
                    fillColor: "#4a9eda",
                    fillOpacity: 0.9,
                    radius: 10,
                    weight: 2.5,
                    color: "#3b2a1a",
                  });
                } else {
                  marker.setStyle({
                    fillColor: "#d0c8b8",
                    fillOpacity: 0.2,
                    radius: 4,
                    weight: 0.5,
                    color: "#b0a490",
                  });
                }
              }
            },
          );
        }
      }

      // ============================================================
      // CITY SELECTION
      // ============================================================
      function selectCity(city) {
        selectedCity = city.key;
        const current = cityMarkers[city.key];

        if (current && current.isDest) {
          viewMode = "hub";
          currentDest = current.destName;
          selectedCity = null;
          document.querySelectorAll(".dest-btn").forEach((b) => {
            b.classList.toggle("active", b.textContent === currentDest);
          });
          updateMapColors();
          updateHubTable();
        } else {
          viewMode = "city";
          document
            .querySelectorAll(".dest-btn")
            .forEach((b) => b.classList.remove("active"));
          document.getElementById("back-btn").style.display = "inline-block";
          updateMapColors();
          updateDetailPanel(city);
        }
      }

      // ============================================================
      // DETAIL PANEL (city mode)
      // ============================================================
      function updateDetailPanel(city) {
        const panel = document.getElementById("detail-panel");
        const content = document.getElementById("detail-content");
        panel.classList.remove("empty");
        content.classList.remove("hub-table-mode");

        if (!city.hasData) {
          content.innerHTML = `
            <div class="city-name">${city.name}</div>
            <div class="city-state">${city.state}</div>
            <div class="city-year-label"><span class="dynamic-year">${currentYear}</span> mail transit times to:</div>
            <p style="color: #8b7355; margin-top: 0.5rem;">No transit time data available for this city. It may have been served by irregular star routes or boat service rather than scheduled rail connections.</p>
        `;
          return;
        }

        let minDest = null,
          maxDest = null,
          minVal = Infinity,
          maxVal = -Infinity;
        let maxForScale = 0;
        DESTINATIONS.forEach((dest) => {
          const v = city.times[dest];
          if (v !== null && v > 0) {
            if (v < minVal) {
              minVal = v;
              minDest = dest;
            }
            if (v > maxVal) {
              maxVal = v;
              maxDest = dest;
            }
            if (v > maxForScale) maxForScale = v;
          }
        });

        let barsHtml = DESTINATIONS.map((dest) => {
          const v = city.times[dest];
          const isFastest = dest === minDest;
          const isSlowest = dest === maxDest;
          const cls = isFastest ? "fastest" : isSlowest ? "slowest" : "";
          if (v === null) {
            return `<div class="bar-row ${cls}">
                <div class="bar-label">${dest}</div>
                <div class="bar-track"><div class="bar-fill" style="width: 0; background: #ccc;"></div></div>
                <div class="bar-time" style="color: #b0a490; font-style: italic;">N/A</div>
            </div>`;
          }
          const pct =
            maxForScale > 0 ? Math.max(1, (v / maxForScale) * 100) : 0;
          const color = getColor(v);
          return `<div class="bar-row ${cls}">
            <div class="bar-label">${dest}</div>
            <div class="bar-track"><div class="bar-fill" style="width: ${pct}%; background: ${color};"></div></div>
            <div class="bar-time">${formatTimeHtml(v)}</div>
        </div>`;
        }).join("");

        content.innerHTML = `
        <div class="city-name">${city.name}</div>
        <div class="city-state">${city.state}</div>
        <div class="city-year-label"><span class="dynamic-year">${currentYear}</span> mail transit times to:</div>
        ${barsHtml}
    `;
      }

      // ============================================================
      // HUB TABLE (hub mode)
      // ============================================================
      function updateHubTable() {
        const panel = document.getElementById("detail-panel");
        const content = document.getElementById("detail-content");
        panel.classList.remove("empty");
        content.classList.add("hub-table-mode");

        const sorted = cities
          .filter((c) => !destKeySet.has(c.key))
          .map((c) => ({ city: c, minutes: c.times[currentDest] }))
          .sort((a, b) => {
            if (a.minutes === null && b.minutes === null) return 0;
            if (a.minutes === null) return 1;
            if (b.minutes === null) return -1;
            return a.minutes - b.minutes;
          });

        const maxMinutes = sorted.reduce(
          (mx, e) => (e.minutes !== null && e.minutes > mx ? e.minutes : mx),
          0,
        );

        let rank = 0;
        let rowsHtml = sorted
          .map((entry) => {
            const c = entry.city;
            const mins = entry.minutes;
            const isNoData = mins === null;
            if (!isNoData) rank++;
            const pct =
              !isNoData && maxMinutes > 0
                ? Math.max(1, (mins / maxMinutes) * 100)
                : 0;
            const color = getColor(mins);
            const timeStr = isNoData ? "N/A" : formatTimeHtml(mins);
            const cls = isNoData ? "no-data" : "";

            return `<div class="hub-table-row ${cls}" data-city-key="${c.key}">
            <div class="ht-rank">${isNoData ? "—" : rank}</div>
            <div class="ht-city">${c.name}<span class="ht-state">${c.state}</span></div>
            <div class="ht-bar"><div class="ht-bar-fill" style="width:${pct}%;background:${color};"></div></div>
            <div class="ht-time">${timeStr}</div>
        </div>`;
          })
          .join("");

        const hubCityObj = cities.find((c) => c.name === currentDest);
        const hubState = hubCityObj ? hubCityObj.state : "";

        content.innerHTML = `
        <div class="hub-table-header">
            <div class="city-name">${currentDest}</div>
            <div class="city-state">${hubState}</div>
            <div class="city-year-label"><span class="dynamic-year">${currentYear}</span> mail transit times to:</div>
        </div>
        <div class="hub-table-list">${rowsHtml}</div>
    `;

        content
          .querySelectorAll(".hub-table-row:not(.no-data)")
          .forEach((row) => {
            row.addEventListener("click", () => {
              const key = row.dataset.cityKey;
              const entry = cityMarkers[key];
              if (entry) {
                selectCity(entry.city);
                map.panTo(entry.city.coords, { animate: true, duration: 0.5 });
              }
            });
          });

        content
          .querySelectorAll(".hub-table-row:not(.no-data)")
          .forEach((row) => {
            row.addEventListener("mouseenter", () => {
              const key = row.dataset.cityKey;
              const entry = cityMarkers[key];
              if (entry && entry.marker && selectedCity !== key) {
                entry.marker.setStyle({ radius: 8, weight: 2 });
              }
            });
            row.addEventListener("mouseleave", () => {
              const key = row.dataset.cityKey;
              const entry = cityMarkers[key];
              if (entry && entry.marker && selectedCity !== key) {
                entry.marker.setStyle({ radius: 6, weight: 1 });
              }
            });
          });
      }

      function highlightTableRow(cityKey, highlight) {
        const row = document.querySelector(
          `.hub-table-row[data-city-key="${CSS.escape(cityKey)}"]`,
        );
        if (row) {
          row.classList.toggle("hovered", highlight);
          if (highlight)
            row.scrollIntoView({ block: "nearest", behavior: "smooth" });
        }
      }

      // ============================================================
      // DESTINATION SELECTOR BUTTONS
      // ============================================================
      const selectorEl = document.getElementById("dest-selector");

      DESTINATIONS.forEach((dest) => {
        const btn = document.createElement("button");
        btn.className = "dest-btn" + (dest === currentDest ? " active" : "");
        btn.textContent = dest;
        btn.addEventListener("click", () => {
          viewMode = "hub";
          currentDest = dest;
          selectedCity = null;
          document
            .querySelectorAll(".dest-btn")
            .forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");
          updateMapColors();
          updateHubTable();
          const query = document.getElementById("search-input").value;
          if (query.length > 0) updateSearchResults(query);
        });
        selectorEl.appendChild(btn);
      });

      // ============================================================
      // YEAR SWITCHING
      // ============================================================
      function switchYear(year) {
        currentYear = year;
        cities = citiesByYear[year];

        // Update year button active states and aria-pressed
        document.querySelectorAll(".year-btn").forEach((b) => {
          const isYear =
            !isNaN(parseInt(b.textContent)) && parseInt(b.textContent) === year;
          if (!isNaN(parseInt(b.textContent))) {
            b.classList.toggle("active", isYear);
            b.setAttribute("aria-pressed", isYear ? "true" : "false");
          }
        });

        // Clear search
        document.getElementById("search-input").value = "";
        document.getElementById("search-results").style.display = "none";

        // Rebuild markers for new year's cities
        createMarkers();

        // Preserve current mode and selection across year switch
        if (viewMode === "city" && selectedCity) {
          const cityObj = cities.find((c) => c.key === selectedCity);
          if (cityObj) {
            // City exists in the new year — stay in city mode, refresh detail panel
            updateMapColors();
            updateDetailPanel(cityObj);
          } else {
            // City not in this year's data — fall back to hub mode
            selectedCity = null;
            viewMode = "hub";
            document.getElementById("back-btn").style.display = "none";
            updateMapColors();
            updateHubTable();
          }
        } else {
          // Hub mode — keep currentDest, just refresh colors and table
          updateMapColors();
          updateHubTable();
        }

        computeStats();
        updateRRLayer();
      }

      // ============================================================
      // SEARCH
      // ============================================================
      const searchInput = document.getElementById("search-input");
      const searchResults = document.getElementById("search-results");

      function fuzzyScore(query, text) {
        const q = query.toLowerCase();
        const t = text.toLowerCase();
        if (t.startsWith(q)) return 100 + (100 - t.length);
        const words = t.split(/[\s,]+/);
        for (const w of words) {
          if (w.startsWith(q)) return 80 + (50 - t.length);
        }
        const idx = t.indexOf(q);
        if (idx >= 0) return 60 - idx;
        let qi = 0,
          matched = 0;
        for (let ti = 0; ti < t.length && qi < q.length; ti++) {
          if (t[ti] === q[qi]) {
            matched++;
            qi++;
          }
        }
        if (qi === q.length) return 30 + matched;
        return -1;
      }

      function updateSearchResults(query) {
        if (!query || query.length === 0) {
          searchResults.style.display = "none";
          return;
        }

        const scored = cities
          .map((city) => {
            const nameScore = fuzzyScore(query, city.name);
            const fullScore = fuzzyScore(query, city.name + ", " + city.state);
            const stateScore = fuzzyScore(query, city.state);
            return { city, score: Math.max(nameScore, fullScore, stateScore) };
          })
          .filter((s) => s.score > 0)
          .sort((a, b) => b.score - a.score)
          .slice(0, 8);

        if (scored.length === 0) {
          searchResults.innerHTML =
            '<div class="search-result" style="cursor: default; color: #8b7355;">No cities found</div>';
          searchResults.style.display = "block";
          return;
        }

        searchResults.innerHTML = scored
          .map(({ city }) => {
            return `<div class="search-result" data-key="${city.key}">
            <div><span class="sr-city">${city.name}</span><span class="sr-state">, ${city.state}</span></div>
        </div>`;
          })
          .join("");

        searchResults.style.display = "block";

        searchResults
          .querySelectorAll(".search-result[data-key]")
          .forEach((el) => {
            el.addEventListener("click", () => {
              const key = el.dataset.key;
              const entry = cityMarkers[key];
              if (entry) {
                selectCity(entry.city);
                map.panTo(entry.city.coords, { animate: true, duration: 0.5 });
              }
              searchResults.style.display = "none";
              searchInput.value = "";
            });
          });
      }

      searchInput.addEventListener("input", (e) =>
        updateSearchResults(e.target.value.trim()),
      );
      searchInput.addEventListener("focus", () => {
        const q = searchInput.value.trim();
        if (q.length > 0) updateSearchResults(q);
      });
      document.addEventListener("click", (e) => {
        if (!e.target.closest("#search-container"))
          searchResults.style.display = "none";
      });

      // ============================================================
      // STATISTICS
      // ============================================================
      function computeStats() {
        let fastest = { time: Infinity, from: "", to: "" };
        let slowest = { time: -Infinity, from: "", to: "" };
        let totalTime = 0;
        let count = 0;

        cities.forEach((city) => {
          if (!city.hasData) return;
          DESTINATIONS.forEach((dest) => {
            const v = city.times[dest];
            if (v !== null && v > 0) {
              if (v < fastest.time)
                fastest = {
                  time: v,
                  from: city.name + ", " + city.state,
                  to: dest,
                };
              if (v > slowest.time)
                slowest = {
                  time: v,
                  from: city.name + ", " + city.state,
                  to: dest,
                };
              totalTime += v;
              count++;
            }
          });
        });

        const avg = count > 0 ? totalTime / count : 0;

        const statsEl = document.getElementById("stats");
        if (!statsEl) return;
        statsEl.innerHTML = `
        <div class="stat-card">
            <div class="stat-value">${formatTimeHtml(fastest.time)}</div>
            <div class="stat-label">Fastest Route</div>
            <div class="stat-detail">${fastest.from} &rarr; ${fastest.to}</div>
        </div>
        <div class="stat-card">
            <div class="stat-value">${formatTimeHtml(slowest.time)}</div>
            <div class="stat-label">Slowest Route</div>
            <div class="stat-detail">${slowest.from} &rarr; ${slowest.to}</div>
        </div>
        <div class="stat-card">
            <div class="stat-value">${formatTimeHtml(avg)}</div>
            <div class="stat-label">Average Transit Time</div>
            <div class="stat-detail">${count} routes with data</div>
        </div>
    `;
      }

      // ============================================================
      // INITIALIZE
      // ============================================================
      createMarkers();
      updateHubTable();
      computeStats();
      updateRRLayer();
    </script>

    <!-- About modal -->
    <div
      id="about-modal"
      onclick="if (event.target === this) this.style.display = 'none';"
      role="dialog"
      aria-modal="true"
      aria-label="About this visualization"
    >
      <div id="about-box">
        <button
          id="about-close"
          onclick="
            document.getElementById('about-modal').style.display = 'none'
          "
        >
          ✕
        </button>
        <div id="about-content">
          <!-- __ABOUT_CONTENT__ -->
        </div>
      </div>
    </div>
  </body>
</html>
